<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Weather</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons (via unpkg for vanilla HTML) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-container" id="app-container">
        
        <header>
            <div class="search-bar-container glass-panel">
                <i data-lucide="search" class="search-icon"></i>
                <input type="text" id="city-input" placeholder="Search for a city..." autocomplete="off">
                <button id="search-btn">Search</button>
            </div>
        </header>

        <main class="weather-dashboard hidden" id="weather-dashboard">
            <!-- Current Weather Section -->
            <section class="current-weather glass-panel slide-up">
                <div class="weather-main-info">
                    <h1 id="location-name">City, Country</h1>
                    <div class="temp-container">
                        <i data-lucide="sun" class="weather-icon" id="main-weather-icon"></i>
                        <h2 id="current-temp">--°</h2>
                    </div>
                    <p id="weather-condition">Condition</p>
                </div>
                
                <div class="weather-details">
                    <div class="detail-item">
                        <i data-lucide="thermometer"></i>
                        <div>
                            <span class="detail-label">Feels Like</span>
                            <span class="detail-value" id="feels-like">--°</span>
                        </div>
                    </div>
                    <div class="detail-item">
                        <i data-lucide="droplets"></i>
                        <div>
                            <span class="detail-label">Humidity</span>
                            <span class="detail-value" id="humidity">--%</span>
                        </div>
                    </div>
                    <div class="detail-item">
                        <i data-lucide="wind"></i>
                        <div>
                            <span class="detail-label">Wind</span>
                            <span class="detail-value" id="wind-speed">-- km/h</span>
                        </div>
                    </div>
                </div>
            </section>



            <!-- Forecast Section -->
            <section class="forecast glass-panel slide-up delay-2">
                <h3>5-Day Forecast</h3>
                <div class="forecast-container" id="forecast-container">
                    <!-- Forecast items will be injected here via JS -->
                </div>
            </section>
        </main>
        
        <div id="loading-spinner" class="loading-spinner hidden">
            <div class="spinner"></div>
            <p>Gathering weather & AI insights...</p>
        </div>
        
        <div id="error-message" class="error-message hidden glass-panel">
            <i data-lucide="alert-circle"></i>
            <p id="error-text">An error occurred.</p>
        </div>

    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
